<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>高级颜色比例查询</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎇</text></svg>">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            padding: 25px;
            background: #f8f9fa;
            min-height: 100vh;
        }

        .input-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 15px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .color-item {
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            font-size: 14px;
            position: relative;
            overflow: hidden;
        }

        .color-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #4dabf7;
            outline: none;
        }

        .filter-section {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #dee2e6;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #4dabf7;
            color: white;
            border-color: #4dabf7;
        }

        .color-detail {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .color-preview {
            width: 100%;
            height: 80px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .color-bars {
            display: flex;
            gap: 5px;
            margin: 15px 0;
        }

        .color-bar {
            height: 25px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .color-bar::after {
            content: attr(data-percent);
            position: absolute;
            right: 5px;
            bottom: 2px;
            font-size: 12px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .formula {
            padding: 12px;
            background: white;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="input-section">
        <h2>🎨 颜色专家</h2>
        <input type="text" id="colorInput" placeholder="输入颜色名称或HEX值">
        
        <div class="filter-section">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="基础色">基础色</button>
            <button class="filter-btn" data-category="混合色">混合色</button>
            <button class="filter-btn" data-category="中性色">中性色</button>
        </div>

        <div class="color-detail" id="colorDetail">
            <div class="color-preview" id="colorPreview"></div>
            <div class="color-bars">
                <div class="color-bar" style="background: #FF0000" id="redBar"></div>
                <div class="color-bar" style="background: #00FF00" id="greenBar"></div>
                <div class="color-bar" style="background: #0000FF" id="blueBar"></div>
            </div>
            <div class="formula" id="formula"></div>
        </div>
    </div>

    <div class="color-grid" id="colorGrid"></div>

    <script>
        // 扩展颜色数据库 (示例数据)
        const colors = [
            // 基础色系
            {name: '纯红', hex: '#FF0000', rgb: [255,0,0], category: '基础色'},
            {name: '纯绿', hex: '#00FF00', rgb: [0,255,0], category: '基础色'},
            {name: '纯蓝', hex: '#0000FF', rgb: [0,0,255], category: '基础色'},
            
            // 混合色系
            {name: '浅粉色', hex: '#FFB6C1', rgb: [255,182,193], category: '混合色'},
            {name: '玫红色', hex: '#FF69B4', rgb: [255,105,180], category: '混合色'},
            {name: '薰衣草紫', hex: '#E6E6FA', rgb: [230,230,250], category: '混合色'},
            
            // 中性色系
            {name: '银灰', hex: '#C0C0C0', rgb: [192,192,192], category: '中性色'},
            {name: '石板灰', hex: '#708090', rgb: [112,128,144], category: '中性色'},
            // ... 添加更多颜色数据
        ];

        // 初始化
        let currentCategory = 'all';
        const colorGrid = document.getElementById('colorGrid');
        const colorInput = document.getElementById('colorInput');
        
        // 生成颜色项
        function createColorItem(color) {
            const item = document.createElement('div');
            item.className = 'color-item';
            item.style.backgroundColor = color.hex;
            item.innerHTML = `
                <div>${color.name}</div>
                <div style="font-size:12px;margin-top:5px">${color.hex}</div>
            `;
            item.onclick = () => showColorDetail(color);
            return item;
        }

        // 显示颜色详情
        function showColorDetail(color) {
            const [r, g, b] = color.rgb;
            document.getElementById('colorPreview').style.backgroundColor = color.hex;
            
            // 更新比例条
            ['redBar', 'greenBar', 'blueBar'].forEach((id, i) => {
                const bar = document.getElementById(id);
                const percent = Math.round((color.rgb[i]/255)*100);
                bar.style.width = `${percent}%`;
                bar.setAttribute('data-percent', `${percent}%`);
            });

            // 生成调色公式
            const formula = `基础配方：红色 ${Math.round((r/255)*100)}% 
                          + 绿色 ${Math.round((g/255)*100)}% 
                          + 蓝色 ${Math.round((b/255)*100)}%`;
            document.getElementById('formula').innerHTML = formula;
        }

        // 过滤颜色
        function filterColors(searchText = '', category = 'all') {
            return colors.filter(color => {
                const matchSearch = color.name.toLowerCase().includes(searchText) || 
                                 color.hex.toLowerCase().includes(searchText);
                const matchCategory = category === 'all' || color.category === category;
                return matchSearch && matchCategory;
            });
        }

        // 更新颜色网格
        function updateColorGrid() {
            const searchText = colorInput.value.toLowerCase();
            const filtered = filterColors(searchText, currentCategory);
            colorGrid.innerHTML = '';
            filtered.forEach(color => {
                colorGrid.appendChild(createColorItem(color));
            });
        }

        // 事件监听
        colorInput.addEventListener('input', updateColorGrid);
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                updateColorGrid();
            });
        });

        // 初始化显示
        updateColorGrid();
        showColorDetail(colors[0]);
    </script>
</body>
</html>
