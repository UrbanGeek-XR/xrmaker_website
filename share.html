  <script>
    // 配置参数
    const urlParams = new URLSearchParams(window.location.search);
    const config = {
      enabled: urlParams.get('enabled') !== 'false',
      passwordHash: 'aca8105394e09500ea47bb427a93a882d024a83dc36085e1da20c62354942c2c',
      shareUrl: 'aHR0cHM6Ly93d2J4ci5sYW56b3V0LmNvbS9iMDE2a2l0bGNq'
    };

    // SHA-256 哈希函数
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex;
    }

    // Base64 解码函数
    function base64Decode(str) {
      return decodeURIComponent(atob(str).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
    }

    // 防调试和防篡改功能
    (function() {
      // 禁用右键菜单
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
      });

      // 禁用常用快捷键
      document.addEventListener('keydown', function(e) {
        // F12
        if (e.key === 'F12' || e.keyCode === 123) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        // Ctrl+Shift+I (开发者工具)
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        // Ctrl+Shift+J (控制台)
        if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        // Ctrl+Shift+C (元素选择)
        if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        // Ctrl+U (查看源码)
        if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      });

      // 检测开发者工具是否打开 - 使用resize事件
      let devtoolsOpen = false;
      const threshold = 160;
      let lastWindowWidth = window.outerWidth;
      let lastWindowHeight = window.outerHeight;

      function checkDevTools() {
        const widthThreshold = window.outerWidth - window.innerWidth > threshold;
        const heightThreshold = window.outerHeight - window.innerHeight > threshold;
        
        if (widthThreshold || heightThreshold) {
          if (!devtoolsOpen) {
            devtoolsOpen = true;
            // 开发者工具打开时的处理
            if (!config.enabled) {
              // 如果网站暂停访问，强制刷新页面
              window.location.reload();
            }
          }
        } else {
          devtoolsOpen = false;
        }
        
        lastWindowWidth = window.outerWidth;
        lastWindowHeight = window.outerHeight;
      }

      // 监听窗口大小变化
      window.addEventListener('resize', checkDevTools);

      // 防止元素被删除或修改
      const originalRemove = HTMLElement.prototype.remove;
      const originalAppendChild = Node.prototype.appendChild;
      const originalInsertBefore = Node.prototype.insertBefore;
      const originalReplaceChild = Node.prototype.replaceChild;

      // 保护暂停访问覆盖层
      function protectSuspendedOverlay() {
        const overlay = document.getElementById('suspended-overlay');
        if (!overlay) return;

        // 重写remove方法
        overlay.remove = function() {
          if (!config.enabled) {
            // 如果网站暂停访问，不允许删除覆盖层
            return;
          }
          originalRemove.call(this);
        };

        // 重写classList.remove方法
        const originalClassListRemove = overlay.classList.remove;
        overlay.classList.remove = function(...args) {
          if (!config.enabled && args.includes('hidden')) {
            // 如果网站暂停访问，不允许移除hidden类
            return;
          }
          originalClassListRemove.apply(this, args);
        };

        // 重写style属性
        Object.defineProperty(overlay, 'style', {
          get: function() {
            return this._style;
          },
          set: function(value) {
            if (!config.enabled) {
              // 如果网站暂停访问，不允许修改样式
              return;
            }
            this._style = value;
          }
        });
      }

      // 创建暂停访问覆盖层
      function createSuspendedOverlay() {
        if (!config.enabled) {
          const overlay = document.createElement('div');
          overlay.id = 'suspended-overlay';
          overlay.className = 'suspended-overlay no-select';
          overlay.innerHTML = `
            <div class="suspended-content">
              <i class="fa-solid fa-ban"></i>
              <h2>网站暂停访问</h2>
              <p>该网站暂时无法访问，请稍后再试</p>
            </div>
          `;
          document.body.appendChild(overlay);
          document.body.style.overflow = 'hidden';
          protectSuspendedOverlay();
        }
      }

      // 监听DOM变化 - 事件驱动方式
      const observer = new MutationObserver(function(mutations) {
        if (!config.enabled) {
          mutations.forEach(function(mutation) {
            const overlay = document.getElementById('suspended-overlay');
            const body = document.body;
            
            // 处理元素删除
            if (mutation.type === 'childList') {
              mutation.removedNodes.forEach(function(node) {
                if (node.id === 'suspended-overlay' || (node.querySelectorAll && node.querySelectorAll('#suspended-overlay').length > 0)) {
                  createSuspendedOverlay();
                }
              });
            }
            
            // 处理属性变化
            if (overlay && mutation.type === 'attributes') {
              if (mutation.attributeName === 'class' && overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
              }
              if (mutation.attributeName === 'style') {
                overlay.style.display = 'flex';
                overlay.style.position = 'fixed';
                overlay.style.zIndex = '2147483647';
              }
            }
          });
          
          // 确保body不可滚动
          if (document.body.style.overflow !== 'hidden') {
            document.body.style.overflow = 'hidden';
          }
        }
      });

      // 开始观察整个文档
      observer.observe(document.documentElement, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['class', 'style', 'id']
      });

      // 防止通过控制台删除覆盖层
      window.addEventListener('beforeunload', function(e) {
        if (!config.enabled) {
          const overlay = document.getElementById('suspended-overlay');
          if (!overlay || overlay.classList.contains('hidden')) {
            e.preventDefault();
            e.returnValue = '';
            return '';
          }
        }
      });

      // 初始化保护
      setTimeout(function() {
        if (!config.enabled) {
          protectSuspendedOverlay();
          // 确保覆盖层存在
          if (!document.getElementById('suspended-overlay')) {
            createSuspendedOverlay();
          }
        }
      }, 0);
    })();

    // 密码验证功能
    (function() {
      const passwordOverlay = document.getElementById('password-overlay');
      const passwordInput = document.getElementById('password-input');
      const passwordSubmit = document.getElementById('password-submit');
      const passwordError = document.getElementById('password-error');
      const websiteContent = document.getElementById('website-content');
      const suspendedOverlay = document.getElementById('suspended-overlay');
      const getShareBtn = document.getElementById('get-share-btn');
      const platformOverlay = document.getElementById('platform-overlay');
      const btnLanzou = document.getElementById('btn-lanzou');
      const btnYukaidi = document.getElementById('btn-yukaidi');
      const cfTurnstileContainer = document.getElementById('cf-turnstile-container');

      // Cloudflare Turnstile 站点密钥（需要在 Cloudflare 控制台获取）
      const TURNSTILE_SITE_KEY = '0x4AAAAAACnixqxBNO1F5Fc_'; // 替换为你的实际站点密钥

      // Turnstile 实例
      let turnstileWidget = null;
      let turnstileToken = null;

      // 初始化 Turnstile
      function initTurnstile() {
        if (typeof turnstile !== 'undefined' && cfTurnstileContainer) {
          turnstileWidget = turnstile.render('#cf-turnstile-container', {
            sitekey: TURNSTILE_SITE_KEY,
            theme: 'light',
            callback: function(token) {
              turnstileToken = token;
              passwordError.textContent = '';
            },
            'error-callback': function() {
              passwordError.textContent = '人机验证失败，请重试';
              turnstileToken = null;
            },
            'expired-callback': function() {
              passwordError.textContent = '验证已过期，请重新验证';
              turnstileToken = null;
            }
          });
        }
      }

      // 重置 Turnstile
      function resetTurnstile() {
        if (turnstileWidget && typeof turnstile !== 'undefined') {
          turnstile.reset(turnstileWidget);
          turnstileToken = null;
        }
      }

      // 检查网站是否启用
      function checkEnabled() {
        if (!config.enabled) {
          if (suspendedOverlay) {
            suspendedOverlay.classList.remove('hidden');
          }
          if (passwordOverlay) {
            passwordOverlay.classList.add('hidden');
          }
          if (websiteContent) {
            websiteContent.classList.add('content-blur');
          }
          document.body.style.overflow = 'hidden';
          return false;
        }
        if (suspendedOverlay) {
          suspendedOverlay.classList.add('hidden');
        }
        if (websiteContent) {
          websiteContent.classList.remove('content-blur');
        }
        return true;
      }

      // 验证密码
      async function verifyPassword() {
        const inputPassword = passwordInput.value.trim();
        
        // 首先检查 Turnstile 验证
        if (!turnstileToken) {
          passwordError.textContent = '请先完成人机验证';
          return;
        }
        
        // 计算输入密码的哈希值
        const inputHash = await sha256(inputPassword);
        
        // 比较哈希值
        if (inputHash === config.passwordHash) {
          // 密码正确，隐藏密码弹窗，显示平台选择弹窗
          passwordOverlay.classList.add('hidden');
          platformOverlay.classList.add('show');
        } else {
          passwordInput.classList.add('error');
          passwordError.textContent = '密码错误，请重试';
          passwordInput.value = '';
          resetTurnstile(); // 重置 Turnstile
          
          // 移除错误动画类以便下次触发
          setTimeout(() => {
            passwordInput.classList.remove('error');
          }, 500);
        }
      }

      // 获取分享按钮点击事件
      getShareBtn.addEventListener('click', function() {
        passwordOverlay.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        passwordInput.focus();
        
        // 初始化 Turnstile
        setTimeout(initTurnstile, 100);
      });

      // 提交按钮点击事件
      passwordSubmit.addEventListener('click', verifyPassword);

      // 回车键提交
      passwordInput.addEventListener('keypress', async function(e) {
        if (e.key === 'Enter') {
          await verifyPassword();
        }
      });

      // 输入时清除错误提示
      passwordInput.addEventListener('input', function() {
        passwordError.textContent = '';
        passwordInput.classList.remove('error');
      });

      // 蓝奏云按钮点击事件
      btnLanzou.addEventListener('click', function() {
        const decodedUrl = base64Decode(config.shareUrl);
        window.location.href = decodedUrl;
      });

      // Yukaidi按钮点击事件
      btnYukaidi.addEventListener('click', function() {
        window.location.href = 'https://silver.yukaidi.com/s/yrl6Up';
      });

      // 初始化检查
      checkEnabled();
    })();
  </script>
</body>
</html>
