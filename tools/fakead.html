  <script>
    let turnstileWidgetId = null;
    let turnstileToken = null;

    (function() {
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
      });
      document.addEventListener('keydown', function(e) {
        if (
          e.key === 'F12' ||
          (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
          (e.ctrlKey && e.key === 'U') ||
          (e.ctrlKey && e.key === 'S') ||
          (e.ctrlKey && e.key === 'P') ||
          (e.ctrlKey && e.shiftKey && e.key === 'F') ||
          (e.metaKey && e.altKey && e.key === 'I')
        ) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      }, true);
      document.addEventListener('dragstart', function(e) {
        e.preventDefault();
      });
      document.addEventListener('selectstart', function(e) {
        e.preventDefault();
      });
    })();

    window.addEventListener('scroll', function() {
      const navbar = document.getElementById('navbar');
      if (window.scrollY > 50) {
        navbar.classList.add('bg-dark/90', 'shadow-lg');
        navbar.classList.remove('bg-transparent');
      } else {
        navbar.classList.remove('bg-dark/90', 'shadow-lg');
        navbar.classList.add('bg-transparent');
      }
    });

    window.turnstileCallback = function(token) {
      turnstileToken = token;
      const passwordSubmit = document.getElementById('password-submit');
      if (passwordSubmit) {
        passwordSubmit.disabled = false;
      }
    };

    window.turnstileErrorCallback = function() {
      turnstileToken = null;
      const passwordSubmit = document.getElementById('password-submit');
      if (passwordSubmit) {
        passwordSubmit.disabled = true;
      }
    };

    window.turnstileExpiredCallback = function() {
      turnstileToken = null;
      const passwordSubmit = document.getElementById('password-submit');
      if (passwordSubmit) {
        passwordSubmit.disabled = true;
      }
    };

    function renderTurnstile() {
      if (window.__TURNHIDE__) { turnstileToken = 'bypassed'; if (document.getElementById('password-submit')) document.getElementById('password-submit').disabled = false; return; }
      const container = document.getElementById('turnstile-container');
      if (container && typeof turnstile !== 'undefined') {
        if (turnstileWidgetId !== null) {
          turnstile.remove(turnstileWidgetId);
          turnstileWidgetId = null;
        }
        container.innerHTML = '';
        turnstileWidgetId = turnstile.render('#turnstile-container', {
          sitekey: '0x4AAAAAACnixqxBNO1F5Fc_',
          theme: 'light',
          callback: window.turnstileCallback,
          'error-callback': window.turnstileErrorCallback,
          'expired-callback': window.turnstileExpiredCallback
        });
      }
    }

    function resetTurnstile() {
      if (turnstileWidgetId !== null && typeof turnstile !== 'undefined') {
        turnstile.remove(turnstileWidgetId);
        turnstileWidgetId = null;
      }
      turnstileToken = null;
      const passwordSubmit = document.getElementById('password-submit');
      if (passwordSubmit) {
        passwordSubmit.disabled = true;
      }
      const container = document.getElementById('turnstile-container');
      if (container) {
        container.innerHTML = '';
      }
    }

    const downloadBtn = document.getElementById('download-btn');
    const fakeAdModal = document.getElementById('fake-ad-modal');
    const closeAd = document.getElementById('close-ad');
    const fakeAdBtn = document.getElementById('fake-ad-btn');
    const passwordModal = document.getElementById('password-modal');
    const passwordInput = document.getElementById('password-input');
    const passwordSubmit = document.getElementById('password-submit');
    const passwordError = document.getElementById('password-error');

    function showModal(modal) {
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
      if (modal === passwordModal) {
        setTimeout(renderTurnstile, 100);
      }
    }

    function hideModal(modal) {
      modal.classList.remove('active');
      document.body.style.overflow = '';
      if (modal === passwordModal) {
        resetTurnstile();
      }
    }

    downloadBtn.addEventListener('click', () => showModal(passwordModal));

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex;
    }

    function base64Decode(str) {
      return decodeURIComponent(escape(atob(str)));
    }

    async function verifyPassword() {
      if (!turnstileToken && !window.__TURNHIDE__) {
        passwordError.textContent = '请先完成人机验证';
        return;
      }

      const passwordHash = '4d6154fa2cd70cb1893cf13adfad8672296d02ad274d4fabebdf49fbba0e5389';
      const jumpUrl = 'aHR0cHM6Ly94cnRvb2xzLnJ0aDEueHl6L2Rvd25sb2FkL2Zha2VfcG9wLXVwcw==';
      const inputPassword = passwordInput.value.trim();
      const inputHash = await sha256(inputPassword);
      
      if (inputHash === passwordHash) {
        hideModal(passwordModal);
        const decodedUrl = base64Decode(jumpUrl);
        window.open(decodedUrl, '_blank');
      } else {
        passwordInput.classList.add('error');
        passwordError.textContent = '密码错误，请重试';
        passwordInput.value = '';
        
        setTimeout(() => {
          passwordInput.classList.remove('error');
        }, 500);
      }
    }

    passwordSubmit.addEventListener('click', verifyPassword);

    passwordInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        if (!passwordSubmit.disabled) {
          verifyPassword();
        }
      }
    });

    passwordInput.addEventListener('input', function() {
      passwordError.textContent = '';
      passwordInput.classList.remove('error');
    });
  </script>
