<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#8B5A2B',
                        secondary: '#D2B48C',
                        board: '#DEB887',
                        black: '#000000',
                        white: '#FFFFFF',
                        easy: '#10B981',
                        medium: '#F59E0B',
                        hard: '#EF4444',
                        hell: '#8B5CF6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .board-grid {
                background-size: 100% 100%;
                background-image: linear-gradient(to right, rgba(0,0,0,0.6) 1px, transparent 1px),
                                  linear-gradient(to bottom, rgba(0,0,0,0.6) 1px, transparent 1px);
            }
            .piece-shadow {
                filter: drop-shadow(0 4px 3px rgb(0 0 0 / 0.07)) drop-shadow(0 2px 2px rgb(0 0 0 / 0.06));
            }
            .piece-transition {
                transition: all 0.2s ease-out;
            }
            .btn-hover {
                transition: all 0.2s ease;
            }
            .btn-hover:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans">
    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-primary text-white p-6 text-center">
            <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold">五子棋</h1>
            <p class="text-secondary mt-2">经典对弈游戏</p>
        </div>
        
        <div class="p-6 md:p-8 flex flex-col md:flex-row gap-6">
            <!-- 游戏区域 -->
            <div class="flex-1 relative">
                <div class="aspect-square bg-board rounded-lg shadow-lg overflow-hidden board-grid" style="background-size: calc(100% / 14) calc(100% / 14);">
                    <canvas id="gameCanvas" class="w-full h-full cursor-pointer"></canvas>
                </div>
                
                <div id="gameStatus" class="mt-4 p-3 bg-secondary/20 rounded-lg text-center">
                    <p id="statusText" class="font-medium">游戏开始! 黑棋先行</p>
                </div>
            </div>
            
            <!-- 游戏控制和信息 -->
            <div class="w-full md:w-80 flex flex-col gap-6">
                <div class="bg-gray-50 rounded-lg p-5 shadow-sm">
                    <h2 class="text-lg font-semibold mb-3 flex items-center">
                        <i class="fa-solid fa-gamepad mr-2 text-primary"></i>游戏设置
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">游戏模式</label>
                            <div class="flex gap-2">
                                <button id="pvpModeBtn" class="flex-1 py-2 px-3 bg-primary text-white rounded-lg text-sm font-medium btn-hover">
                                    玩家对战
                                </button>
                                <button id="aiModeBtn" class="flex-1 py-2 px-3 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium btn-hover">
                                    人机对战
                                </button>
                            </div>
                        </div>
                        <div id="difficultyContainer" class="hidden">
                            <label class="block text-sm font-medium text-gray-700 mb-2">难度选择</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button data-difficulty="easy" class="difficulty-btn py-2 px-3 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium btn-hover">
                                    简单
                                </button>
                                <button data-difficulty="medium" class="difficulty-btn py-2 px-3 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium btn-hover">
                                    中等
                                </button>
                                <button data-difficulty="hard" class="difficulty-btn py-2 px-3 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium btn-hover">
                                    困难
                                </button>
                                <button data-difficulty="hell" class="difficulty-btn py-2 px-3 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium btn-hover">
                                    地狱
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="bg-gray-50 rounded-lg p-5 shadow-sm">
                    <h2 class="text-lg font-semibold mb-3 flex items-center">
                        <i class="fa-solid fa-info-circle mr-2 text-primary"></i>游戏信息
                    </h2>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="text-gray-600">当前回合</span>
                            <div class="flex items-center">
                                <div id="currentPlayer" class="w-6 h-6 rounded-full bg-black mr-2 piece-shadow"></div>
                                <span id="playerText">黑棋</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-600">游戏时间</span>
                            <span id="gameTime" class="font-mono">00:00</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-600">步数</span>
                            <span id="moveCount">0</span>
                        </div>
                        <div id="aiInfo" class="flex items-center justify-between hidden">
                            <span class="text-gray-600">AI难度</span>
                            <span id="aiDifficultyText" class="font-medium">-</span>
                        </div>
                    </div>
                </div>
                
                <div class="bg-gray-50 rounded-lg p-5 shadow-sm">
                    <h2 class="text-lg font-semibold mb-3 flex items-center">
                        <i class="fa-solid fa-crown mr-2 text-primary"></i>游戏规则
                    </h2>
                    <ul class="text-sm text-gray-600 space-y-2">
                        <li class="flex items-start">
                            <i class="fa-solid fa-circle text-xs mt-1.5 mr-2 text-primary"></i>
                            <span>黑棋和白棋轮流在棋盘上落子</span>
                        </li>
                        <li class="flex items-start">
                            <i class="fa-solid fa-circle text-xs mt-1.5 mr-2 text-primary"></i>
                            <span>先在横、竖或斜方向形成五子连线者获胜</span>
                        </li>
                        <li class="flex items-start">
                            <i class="fa-solid fa-circle text-xs mt-1.5 mr-2 text-primary"></i>
                            <span>点击棋盘上的交叉点放置棋子</span>
                        </li>
                    </ul>
                </div>
                
                <div class="flex gap-3">
                    <button id="restartBtn" class="flex-1 bg-primary hover:bg-primary/90 text-white py-3 px-4 rounded-lg font-medium btn-hover flex items-center justify-center">
                        <i class="fa-solid fa-refresh mr-2"></i>重新开始
                    </button>
                    <button id="undoBtn" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 py-3 px-4 rounded-lg font-medium btn-hover flex items-center justify-center">
                        <i class="fa-solid fa-undo mr-2"></i>悔棋
                    </button>
                </div>
            </div>
        </div>
        
        <div class="bg-gray-50 p-4 text-center text-sm text-gray-500">
            <p>© 2025 五子棋游戏 | 一个简单的 Web 游戏</p>
        </div>
    </div>

    <!-- 胜利提示模态框 -->
    <div id="winModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl p-8 max-w-md w-full mx-4 transform transition-transform duration-300 scale-95">
            <div class="text-center">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-trophy text-3xl text-yellow-500"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2" id="winnerText">黑棋获胜!</h2>
                <p class="text-gray-600 mb-6">恭喜您赢得了这场精彩的比赛!</p>
                <button id="newGameBtn" class="bg-primary hover:bg-primary/90 text-white py-3 px-8 rounded-lg font-medium btn-hover">
                    开始新游戏
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 游戏常量
            const BOARD_SIZE = 15; // 15x15的棋盘
            const CELL_SIZE = Math.min(window.innerWidth * 0.8 / BOARD_SIZE, window.innerHeight * 0.6 / BOARD_SIZE);
            const PIECE_SIZE = CELL_SIZE * 0.8;
            
            // 游戏状态
            let gameBoard = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            let currentPlayer = 1; // 1: 黑棋, 2: 白棋
            let gameActive = true;
            let moveHistory = [];
            let gameTime = 0;
            let timerInterval;
            let gameMode = 'pvp'; // 'pvp' 或 'ai'
            let aiDifficulty = null; // 'easy', 'medium', 'hard', 'hell'
            let aiThinking = false;
            
            // DOM元素
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const statusText = document.getElementById('statusText');
            const currentPlayerEl = document.getElementById('currentPlayer');
            const playerText = document.getElementById('playerText');
            const moveCountEl = document.getElementById('moveCount');
            const gameTimeEl = document.getElementById('gameTime');
            const restartBtn = document.getElementById('restartBtn');
            const undoBtn = document.getElementById('undoBtn');
            const winModal = document.getElementById('winModal');
            const winnerText = document.getElementById('winnerText');
            const newGameBtn = document.getElementById('newGameBtn');
            const pvpModeBtn = document.getElementById('pvpModeBtn');
            const aiModeBtn = document.getElementById('aiModeBtn');
            const difficultyContainer = document.getElementById('difficultyContainer');
            const difficultyBtns = document.querySelectorAll('.difficulty-btn');
            const aiInfo = document.getElementById('aiInfo');
            const aiDifficultyText = document.getElementById('aiDifficultyText');
            
            // 设置Canvas尺寸
            canvas.width = CELL_SIZE * (BOARD_SIZE - 1);
            canvas.height = CELL_SIZE * (BOARD_SIZE - 1);
            
            // 绘制棋盘
            function drawBoard() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 绘制网格线
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 1.5;
                
                for (let i = 0; i < BOARD_SIZE; i++) {
                    // 水平线
                    ctx.beginPath();
                    ctx.moveTo(0, i * CELL_SIZE);
                    ctx.lineTo(canvas.width, i * CELL_SIZE);
                    ctx.stroke();
                    
                    // 垂直线
                    ctx.beginPath();
                    ctx.moveTo(i * CELL_SIZE, 0);
                    ctx.lineTo(i * CELL_SIZE, canvas.height);
                    ctx.stroke();
                }
                
                // 绘制天元和星位
                const starPoints = [
                    {x: 3, y: 3}, {x: 3, y: 11}, {x: 7, y: 7}, 
                    {x: 11, y: 3}, {x: 11, y: 11}
                ];
                
                starPoints.forEach(point => {
                    ctx.beginPath();
                    ctx.arc(point.x * CELL_SIZE, point.y * CELL_SIZE, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#8B4513';
                    ctx.fill();
                });
                
                // 绘制棋子
                for (let i = 0; i < BOARD_SIZE; i++) {
                    for (let j = 0; j < BOARD_SIZE; j++) {
                        if (gameBoard[i][j] !== 0) {
                            drawPiece(i, j, gameBoard[i][j]);
                        }
                    }
                }
            }
            
            // 绘制棋子
            function drawPiece(row, col, player) {
                const x = col * CELL_SIZE;
                const y = row * CELL_SIZE;
                
                // 棋子阴影
                ctx.beginPath();
                ctx.arc(x, y, PIECE_SIZE / 2 + 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.fill();
                
                // 棋子本体
                ctx.beginPath();
                ctx.arc(x, y, PIECE_SIZE / 2, 0, Math.PI * 2);
                
                if (player === 1) {
                    // 黑棋 - 渐变效果
                    const gradient = ctx.createRadialGradient(
                        x - PIECE_SIZE / 6, y - PIECE_SIZE / 6, PIECE_SIZE / 10,
                        x, y, PIECE_SIZE / 2
                    );
                    gradient.addColorStop(0, '#555');
                    gradient.addColorStop(1, '#000');
                    ctx.fillStyle = gradient;
                } else {
                    // 白棋 - 渐变效果
                    const gradient = ctx.createRadialGradient(
                        x - PIECE_SIZE / 6, y - PIECE_SIZE / 6, PIECE_SIZE / 10,
                        x, y, PIECE_SIZE / 2
                    );
                    gradient.addColorStop(0, '#fff');
                    gradient.addColorStop(1, '#ddd');
                    ctx.fillStyle = gradient;
                }
                
                ctx.fill();
                
                // 棋子边缘
                ctx.strokeStyle = player === 1 ? '#333' : '#ccc';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            
            // 检查胜利条件
            function checkWin(row, col, player) {
                const directions = [
                    [1, 0],   // 水平
                    [0, 1],   // 垂直
                    [1, 1],   // 对角线
                    [1, -1]   // 反对角线
                ];
                
                for (const [dx, dy] of directions) {
                    let count = 1;  // 当前位置已经有一个棋子
                    
                    // 正向检查
                    for (let i = 1; i < 5; i++) {
                        const newRow = row + i * dy;
                        const newCol = col + i * dx;
                        
                        if (newRow < 0 || newRow >= BOARD_SIZE || newCol < 0 || newCol >= BOARD_SIZE) {
                            break;
                        }
                        
                        if (gameBoard[newRow][newCol] === player) {
                            count++;
                        } else {
                            break;
                        }
                    }
                    
                    // 反向检查
                    for (let i = 1; i < 5; i++) {
                        const newRow = row - i * dy;
                        const newCol = col - i * dx;
                        
                        if (newRow < 0 || newRow >= BOARD_SIZE || newCol < 0 || newCol >= BOARD_SIZE) {
                            break;
                        }
                        
                        if (gameBoard[newRow][newCol] === player) {
                            count++;
                        } else {
                            break;
                        }
                    }
                    
                    if (count >= 5) {
                        return true;
                    }
                }
                
                return false;
            }
            
            // 检查平局
            function checkDraw() {
                for (let i = 0; i < BOARD_SIZE; i++) {
                    for (let j = 0; j < BOARD_SIZE; j++) {
                        if (gameBoard[i][j] === 0) {
                            return false; // 还有空位，不是平局
                        }
                    }
                }
                return true; // 棋盘已满，平局
            }
            
            // 更新游戏状态显示
            function updateGameStatus() {
                if (gameActive) {
                    let playerType = '';
                    if (gameMode === 'ai' && currentPlayer === 2) {
                        playerType = '(AI)';
                    }
                    statusText.textContent = `游戏进行中 - ${currentPlayer === 1 ? '黑棋' : '白棋'}${playerType}回合`;
                    currentPlayerEl.className = `w-6 h-6 rounded-full ${currentPlayer === 1 ? 'bg-black' : 'bg-white border border-gray-300'} mr-2 piece-shadow`;
                    playerText.textContent = `${currentPlayer === 1 ? '黑棋' : '白棋'}${playerType}`;
                }
                moveCountEl.textContent = moveHistory.length;
            }
            
            // 更新游戏时间
            function updateGameTime() {
                gameTime++;
                const minutes = Math.floor(gameTime / 60).toString().padStart(2, '0');
                const seconds = (gameTime % 60).toString().padStart(2, '0');
                gameTimeEl.textContent = `${minutes}:${seconds}`;
            }
            
            // 开始计时
            function startTimer() {
                clearInterval(timerInterval);
                timerInterval = setInterval(updateGameTime, 1000);
            }
            
            // 停止计时
            function stopTimer() {
                clearInterval(timerInterval);
            }
            
            // 显示胜利模态框
            function showWinModal(winner) {
                gameActive = false;
                stopTimer();
                
                winnerText.textContent = `${winner === 1 ? '黑棋' : '白棋'}获胜!`;
                winModal.classList.remove('hidden');
                
                // 添加动画效果
                setTimeout(() => {
                    winModal.classList.add('opacity-100');
                    winModal.querySelector('div').classList.remove('scale-95');
                    winModal.querySelector('div').classList.add('scale-100');
                }, 10);
            }
            
            // 隐藏胜利模态框
            function hideWinModal() {
                winModal.classList.remove('opacity-100');
                winModal.querySelector('div').classList.remove('scale-100');
                winModal.querySelector('div').classList.add('scale-95');
                
                setTimeout(() => {
                    winModal.classList.add('hidden');
                }, 300);
            }
            
            // AI决策函数 - 根据难度级别选择最佳位置
            function aiMakeMove() {
                if (!gameActive || aiThinking || gameMode !== 'ai') return;
                
                aiThinking = true;
                
                // 添加思考延迟，让AI看起来更自然
                setTimeout(() => {
                    let bestMove = null;
                    
                    switch (aiDifficulty) {
                        case 'easy':
                            // 简单模式：随机选择空位
                            bestMove = getRandomMove();
                            break;
                        case 'medium':
                            // 中等模式：优先防守，其次进攻
                            bestMove = getMediumMove();
                            break;
                        case 'hard':
                            // 困难模式：更强的进攻和防守策略
                            bestMove = getHardMove();
                            break;
                        case 'hell':
                            // 地狱模式：基于评分系统的综合策略
                            bestMove = getHellMove();
                            break;
                        default:
                            bestMove = getRandomMove();
                    }
                    
                    if (bestMove) {
                        // 落子
                        gameBoard[bestMove.row][bestMove.col] = currentPlayer;
                        moveHistory.push({row: bestMove.row, col: bestMove.col, player: currentPlayer});
                        
                        // 绘制棋盘
                        drawBoard();
                        
                        // 检查是否胜利
                        if (checkWin(bestMove.row, bestMove.col, currentPlayer)) {
                            showWinModal(currentPlayer);
                            aiThinking = false;
                            return;
                        }
                        
                        // 检查是否平局
                        if (checkDraw()) {
                            gameActive = false;
                            stopTimer();
                            statusText.textContent = '游戏结束 - 平局!';
                            aiThinking = false;
                            return;
                        }
                        
                        // 切换玩家
                        currentPlayer = currentPlayer === 1 ? 2 : 1;
                        updateGameStatus();
                    }
                    
                    aiThinking = false;
                }, 500 + Math.random() * 1000); // 随机延迟，增加真实感
            }
            
            // 简单模式：随机选择空位
            function getRandomMove() {
                const emptyPositions = [];
                for (let i = 0; i < BOARD_SIZE; i++) {
                    for (let j = 0; j < BOARD_SIZE; j++) {
                        if (gameBoard[i][j] === 0) {
                            emptyPositions.push({row: i, col: j});
                        }
                    }
                }
                
                if (emptyPositions.length > 0) {
                    const randomIndex = Math.floor(Math.random() * emptyPositions.length);
                    return emptyPositions[randomIndex];
                }
                return null;
            }
            
            // 中等模式：优先防守，其次进攻
            function getMediumMove() {
                // 先检查是否有防守点（玩家即将形成五子连线）
                for (let i = 0; i < BOARD_SIZE; i++) {
                    for (let j = 0; j < BOARD_SIZE; j++) {
                        if (gameBoard[i][j] === 0) {
                            gameBoard[i][j] = 1; // 假设玩家在此落子
                            if (checkWin(i, j, 1)) {
                                gameBoard[i][j] = 0; // 恢复棋盘
                                return {row: i, col: j}; // 防守此点
                            }
                            gameBoard[i][j] = 0; // 恢复棋盘
                        }
                    }
                }
                
                // 再检查是否有进攻点（AI即将形成五子连线）
                for (let i = 0; i < BOARD_SIZE; i++) {
                    for (let j = 0; j < BOARD_SIZE; j++) {
                        if (gameBoard[i][j] === 0) {
                            gameBoard[i][j] = 2; // 假设AI在此落子
                            if (checkWin(i, j, 2)) {
                                gameBoard[i][j] = 0; // 恢复棋盘
                                return {row: i, col: j}; // 进攻此点
                            }
                            gameBoard[i][j] = 0; // 恢复棋盘
                        }
                    }
                }
                
                // 如果没有明显的进攻或防守点，优先选择中心区域
                const centerArea = [];
                const center = Math.floor(BOARD_SIZE / 2);
                const radius = 4;
                
                for (let i = Math.max(0, center - radius); i <= Math.min(BOARD_SIZE - 1, center + radius); i++) {
                    for (let j = Math.max(0, center - radius); j <= Math.min(BOARD_SIZE - 1, center + radius); j++) {
                        if (gameBoard[i][j] === 0) {
                            centerArea.push({row: i, col: j});
                        }
                    }
                }
                
                if (centerArea.length > 0) {
                    const randomIndex = Math.floor(Math.random() * centerArea.length);
                    return centerArea[randomIndex];
                }
                
                // 否则随机选择
                return getRandomMove();
            }
            
            // 困难模式：更强的进攻和防守策略
            function getHardMove() {
                // 检查是否有防守点（玩家有四个连续棋子）
                const playerFourInRow = findFourInRow(1);
                if (playerFourInRow) return playerFourInRow;
                
                // 检查是否有进攻点（AI有四个连续棋子）
                const aiFourInRow = findFourInRow(2);
                if (aiFourInRow) return aiFourInRow;
                
                // 检查是否有防守点（玩家有三个连续棋子）
                const playerThreeInRow = findThreeInRow(1);
                if (playerThreeInRow) return playerThreeInRow;
                
                // 检查是否有进攻点（AI有三个连续棋子）
                const aiThreeInRow = findThreeInRow(2);
                if (aiThreeInRow) return aiThreeInRow;
                
                // 如果没有明显的进攻或防守点，使用评分系统
                return getScoredMove(0.7); // 0.7的权重偏向进攻
            }
            
            // 地狱模式：基于评分系统的综合策略
            function getHellMove() {
                // 检查是否有防守点（玩家有四个连续棋子）
                const playerFourInRow = findFourInRow(1);
                if (playerFourInRow) return playerFourInRow;
                
                // 检查是否有进攻点（AI有四个连续棋子）
                const aiFourInRow = findFourInRow(2);
                if (aiFourInRow) return aiFourInRow;
                
                // 使用高级评分系统
                return getScoredMove(0.8); // 0.8的权重偏向进攻
            }
            
            // 查找四个连续棋子的位置
            function findFourInRow(player) {
                const directions = [
                    [1, 0],   // 水平
                    [0, 1],   // 垂直
                    [1, 1],   // 对角线
                    [1, -1]   // 反对角线
                ];
                
                for (let i = 0; i < BOARD_SIZE; i++) {
                    for (let j = 0; j < BOARD_SIZE; j++) {
                        if (gameBoard[i][j] === 0) {
                            for (const [dx, dy] of directions) {
                                let count = 0;
                                
                                // 检查正向
                                for (let k = 1; k <= 4; k++) {
                                    const newRow = i + k * dy;
                                    const newCol = j + k * dx;
                                    
                                    if (newRow < 0 || newRow >= BOARD_SIZE || newCol < 0 || newCol >= BOARD_SIZE) {
                                        break;
                                    }
                                    
                                    if (gameBoard[newRow][newCol] === player) {
                                        count++;
                                    } else {
                                        break;
                                    }
                                }
                                
                                // 检查反向
                                for (let k = 1; k <= 4; k++) {
                                    const newRow = i - k * dy;
                                    const newCol = j - k * dx;
                                    
                                    if (newRow < 0 || newRow >= BOARD_SIZE || newCol < 0 || newCol >= BOARD_SIZE) {
                                        break;
                                    }
                                    
                                    if (gameBoard[newRow][newCol] === player) {
                                        count++;
                                    } else {
                                        break;
                                    }
                                }
                                
                                if (count >= 4) {
                                    return {row: i, col: j};
                                }
                            }
                        }
                    }
                }
                
                return null;
            }
            
            // 查找三个连续棋子的位置
            function findThreeInRow(player) {
                const directions = [
                    [1, 0],   // 水平
                    [0, 1],   // 垂直
                    [1, 1],   // 对角线
                    [1, -1]   // 反对角线
                ];
                
                for (let i = 0; i < BOARD_SIZE; i++) {
                    for (let j = 0; j < BOARD_SIZE; j++) {
                        if (gameBoard[i][j] === 0) {
                            for (const [dx, dy] of directions) {
                                let count = 0;
                                
                                // 检查正向
                                for (let k = 1; k <= 3; k++) {
                                    const newRow = i + k * dy;
                                    const newCol = j + k * dx;
                                    
                                    if (newRow < 0 || newRow >= BOARD_SIZE || newCol < 0 || newCol >= BOARD_SIZE) {
                                        break;
                                    }
                                    
                                    if (gameBoard[newRow][newCol] === player) {
                                        count++;
                                    } else {
                                        break;
                                    }
                                }
                                
                                // 检查反向
                                for (let k = 1; k <= 3; k++) {
                                    const newRow = i - k * dy;
                                    const newCol = j - k * dx;
                                    
                                    if (newRow < 0 || newRow >= BOARD_SIZE || newCol < 0 || newCol >= BOARD_SIZE) {
                                        break;
                                    }
                                    
                                    if (gameBoard[newRow][newCol] === player) {
                                        count++;
                                    } else {
                                        break;
                                    }
                                }
                                
                                if (count >= 3) {
                                    return {row: i, col: j};
                                }
                            }
                        }
                    }
                }
                
                return null;
            }
            
            // 基于评分系统选择最佳位置
            function getScoredMove(offenseWeight = 0.5) {
                let bestScore = -Infinity;
                let bestMoves = [];
                
                for (let i = 0; i < BOARD_SIZE; i++) {
                    for (let j = 0; j < BOARD_SIZE; j++) {
                        if (gameBoard[i][j] === 0) {
                            // 计算进攻评分
                            gameBoard[i][j] = 2; // 假设AI在此落子
                            const offenseScore = evaluatePosition(i, j, 2);
                            gameBoard[i][j] = 0; // 恢复棋盘
                            
                            // 计算防守评分
                            gameBoard[i][j] = 1; // 假设玩家在此落子
                            const defenseScore = evaluatePosition(i, j, 1);
                            gameBoard[i][j] = 0; // 恢复棋盘
                            
                            // 计算总评分（进攻权重 + 防守权重 = 1）
                            const totalScore = offenseScore * offenseWeight + defenseScore * (1 - offenseWeight);
                            
                            // 考虑位置的中心性
                            const centerBonus = getCenterBonus(i, j);
                            
                            const finalScore = totalScore + centerBonus;
                            
                            if (finalScore > bestScore) {
                                bestScore = finalScore;
                                bestMoves = [{row: i, col: j}];
                            } else if (finalScore === bestScore) {
                                bestMoves.push({row: i, col: j});
                            }
                        }
                    }
                }
                
                if (bestMoves.length > 0) {
                    // 从最佳位置中随机选择一个，增加一些不确定性
                    const randomIndex = Math.floor(Math.random() * bestMoves.length);
                    return bestMoves[randomIndex];
                }
                
                return getRandomMove();
            }
            
            // 评估位置的价值
            function evaluatePosition(row, col, player) {
                const directions = [
                    [1, 0],   // 水平
                    [0, 1],   // 垂直
                    [1, 1],   // 对角线
                    [1, -1]   // 反对角线
                ];
                
                let maxScore = 0;
                
                for (const [dx, dy] of directions) {
                    let score = 0;
                    let consecutive = 1; // 当前位置已经有一个棋子
                    let blockedEnds = 0;
                    
                    // 检查正向
                    for (let i = 1; i < 5; i++) {
                        const newRow = row + i * dy;
                        const newCol = col + i * dx;
                        
                        if (newRow < 0 || newRow >= BOARD_SIZE || newCol < 0 || newCol >= BOARD_SIZE) {
                            blockedEnds++;
                            break;
                        }
                        
                        if (gameBoard[newRow][newCol] === player) {
                            consecutive++;
                        } else if (gameBoard[newRow][newCol] === 0) {
                            break;
                        } else {
                            blockedEnds++;
                            break;
                        }
                    }
                    
                    // 检查反向
                    for (let i = 1; i < 5; i++) {
                        const newRow = row - i * dy;
                        const newCol = col - i * dx;
                        
                        if (newRow < 0 || newRow >= BOARD_SIZE || newCol < 0 || newCol >= BOARD_SIZE) {
                            blockedEnds++;
                            break;
                        }
                        
                        if (gameBoard[newRow][newCol] === player) {
                            consecutive++;
                        } else if (gameBoard[newRow][newCol] === 0) {
                            break;
                        } else {
                            blockedEnds++;
                            break;
                        }
                    }
                    
                    // 根据连续棋子数量和阻塞端数计算分数
                    if (consecutive >= 5) {
                        score = 10000; // 五连子，最高分
                    } else if (consecutive === 4) {
                        if (blockedEnds === 0) {
                            score = 1000; // 活四
                        } else if (blockedEnds === 1) {
                            score = 100; // 冲四
                        }
                    } else if (consecutive === 3) {
                        if (blockedEnds === 0) {
                            score = 50; // 活三
                        } else if (blockedEnds === 1) {
                            score = 10; // 冲三
                        }
                    } else if (consecutive === 2) {
                        if (blockedEnds === 0) {
                            score = 5; // 活二
                        } else if (blockedEnds === 1) {
                            score = 2; // 冲二
                        }
                    } else if (consecutive === 1) {
                        score = 1; // 单棋
                    }
                    
                    maxScore = Math.max(maxScore, score);
                }
                
                return maxScore;
            }
            
            // 获取位置的中心性奖励
            function getCenterBonus(row, col) {
                const center = Math.floor(BOARD_SIZE / 2);
                const distanceFromCenter = Math.sqrt(Math.pow(row - center, 2) + Math.pow(col - center, 2));
                const maxDistance = Math.sqrt(Math.pow(center, 2) + Math.pow(center, 2));
                
                // 中心位置奖励最高，边缘位置奖励最低
                return (1 - distanceFromCenter / maxDistance) * 5;
            }
            
            // 重置游戏
            function resetGame() {
                gameBoard = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
                currentPlayer = 1;
                gameActive = true;
                moveHistory = [];
                gameTime = 0;
                aiThinking = false;
                
                drawBoard();
                updateGameStatus();
                gameTimeEl.textContent = '00:00';
                
                stopTimer();
                startTimer();
                
                hideWinModal();
            }
            
            // 悔棋
            function undoMove() {
                if (moveHistory.length === 0 || !gameActive || aiThinking) {
                    return;
                }
                
                // 在AI模式下，悔棋需要撤销两步（玩家和AI的一步）
                const stepsToUndo = gameMode === 'ai' && moveHistory.length >= 2 ? 2 : 1;
                
                for (let i = 0; i < stepsToUndo; i++) {
                    if (moveHistory.length > 0) {
                        const lastMove = moveHistory.pop();
                        gameBoard[lastMove.row][lastMove.col] = 0;
                    }
                }
                
                // 确保当前玩家是人类玩家
                currentPlayer = 1;
                
                drawBoard();
                updateGameStatus();
            }
            
            // 点击棋盘事件
            canvas.addEventListener('click', (e) => {
                if (!gameActive || (gameMode === 'ai' && (currentPlayer === 2 || aiThinking))) return;
                
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                // 计算点击的格子坐标
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                
                const col = Math.round(x / CELL_SIZE);
                const row = Math.round(y / CELL_SIZE);
                
                // 检查坐标是否在棋盘内且为空
                if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE && gameBoard[row][col] === 0) {
                    // 落子
                    gameBoard[row][col] = currentPlayer;
                    moveHistory.push({row, col, player: currentPlayer});
                    
                    // 添加落子动画效果
                    drawBoard();
                    
                    // 检查是否胜利
                    if (checkWin(row, col, currentPlayer)) {
                        showWinModal(currentPlayer);
                        return;
                    }
                    
                    // 检查是否平局
                    if (checkDraw()) {
                        gameActive = false;
                        stopTimer();
                        statusText.textContent = '游戏结束 - 平局!';
                        return;
                    }
                    
                    // 切换玩家
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    updateGameStatus();
                    
                    // 如果是AI模式且当前是AI回合，让AI下棋
                    if (gameMode === 'ai' && currentPlayer === 2) {
                        aiMakeMove();
                    }
                }
            });
            
            // 鼠标悬停预览效果
            canvas.addEventListener('mousemove', (e) => {
                if (!gameActive || (gameMode === 'ai' && (currentPlayer === 2 || aiThinking))) return;
                
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                // 计算鼠标所在的格子坐标
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                
                const col = Math.round(x / CELL_SIZE);
                const row = Math.round(y / CELL_SIZE);
                
                // 清除之前的预览
                drawBoard();
                
                // 如果坐标在棋盘内且为空，绘制预览棋子
                if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE && gameBoard[row][col] === 0) {
                    ctx.beginPath();
                    ctx.arc(col * CELL_SIZE, row * CELL_SIZE, PIECE_SIZE / 2, 0, Math.PI * 2);
                    
                    if (currentPlayer === 1) {
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                    } else {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                    }
                    
                    ctx.fill();
                }
            });
            
            // 鼠标离开棋盘时重绘
            canvas.addEventListener('mouseleave', () => {
                drawBoard();
            });
            
            // 游戏模式切换
            function switchGameMode(mode) {
                gameMode = mode;
                
                if (mode === 'pvp') {
                    pvpModeBtn.classList.remove('bg-gray-200', 'text-gray-700');
                    pvpModeBtn.classList.add('bg-primary', 'text-white');
                    aiModeBtn.classList.remove('bg-primary', 'text-white');
                    aiModeBtn.classList.add('bg-gray-200', 'text-gray-700');
                    difficultyContainer.classList.add('hidden');
                    aiInfo.classList.add('hidden');
                    aiDifficulty = null;
                } else {
                    aiModeBtn.classList.remove('bg-gray-200', 'text-gray-700');
                    aiModeBtn.classList.add('bg-primary', 'text-white');
                    pvpModeBtn.classList.remove('bg-primary', 'text-white');
                    pvpModeBtn.classList.add('bg-gray-200', 'text-gray-700');
                    difficultyContainer.classList.remove('hidden');
                }
                
                // 重置游戏
                resetGame();
            }
            
            // 难度选择
            function selectDifficulty(difficulty) {
                aiDifficulty = difficulty;
                
                // 难度对应的颜色
                const difficultyColors = {
                    'easy': 'bg-easy',
                    'medium': 'bg-medium',
                    'hard': 'bg-hard',
                    'hell': 'bg-hell'
                };
                
                // 更新按钮样式
                difficultyBtns.forEach(btn => {
                    // 重置所有按钮样式
                    btn.classList.remove('bg-easy', 'bg-medium', 'bg-hard', 'bg-hell', 'text-white', 'ring-2', 'ring-white');
                    btn.classList.add('bg-gray-200', 'text-gray-700');
                });
                
                const selectedBtn = document.querySelector(`[data-difficulty="${difficulty}"]`);
                if (selectedBtn) {
                    // 设置选中按钮的样式
                    selectedBtn.classList.remove('bg-gray-200', 'text-gray-700');
                    selectedBtn.classList.add(difficultyColors[difficulty], 'text-white', 'ring-2', 'ring-white');
                }
                
                // 更新AI信息显示
                aiInfo.classList.remove('hidden');
                
                const difficultyNames = {
                    'easy': '简单',
                    'medium': '中等',
                    'hard': '困难',
                    'hell': '地狱'
                };
                
                aiDifficultyText.textContent = difficultyNames[difficulty] || '-';
                
                // 重置游戏
                resetGame();
            }
            
            // 事件监听
            restartBtn.addEventListener('click', resetGame);
            undoBtn.addEventListener('click', undoMove);
            newGameBtn.addEventListener('click', resetGame);
            
            // 游戏模式切换事件
            pvpModeBtn.addEventListener('click', () => switchGameMode('pvp'));
            aiModeBtn.addEventListener('click', () => switchGameMode('ai'));
            
            // 难度选择事件
            difficultyBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const difficulty = btn.getAttribute('data-difficulty');
                    selectDifficulty(difficulty);
                });
            });
            
            // 初始化游戏
            drawBoard();
            updateGameStatus();
            startTimer();
            
            // 默认选择玩家对战模式
            switchGameMode('pvp');
        });
    </script>
