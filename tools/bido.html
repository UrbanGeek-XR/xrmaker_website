    const msiUrl = 'aHR0cHM6Ly94cnRvb2xzLnJ0aDEueHl6L2Rvd25sb2FkL2JpbGliaWxpX2Rvd25sb2FkZXIuaHRtbD9rZXk9bXNp';

    const otherVersionsModal = document.getElementById('other-versions-modal');
    const downloadMsiBtn = document.getElementById('download-msi-btn');
    const downloadZipBtn = document.getElementById('download-zip-btn');
    const closeOtherVersionsBtn = document.getElementById('close-other-versions-btn');

    const noticeModal = document.getElementById('notice-modal');
    const noticeMessage = document.getElementById('notice-message');
    const closeNoticeBtn = document.getElementById('close-notice-btn');

    const sourceHighspeedBtn = document.getElementById('source-highspeed-btn');
    const sourceYukaidiBtn = document.getElementById('source-yukaidi-btn');
    const sourceLanzouiBtn = document.getElementById('source-lanzoui-btn');
    const highspeedButtons = document.getElementById('highspeed-buttons');
    const yukaidiButtons = document.getElementById('yukaidi-buttons');
    const lanzouiButtons = document.getElementById('lanzoui-buttons');

    function switchSource(source) {
      currentSource = source;
      const allBtns = document.querySelectorAll('.source-btn');
      allBtns.forEach(btn => {
        btn.classList.remove('bg-white', 'text-primary');
        btn.classList.add('bg-white/20', 'text-white', 'border-2', 'border-white/50');
      });
      const activeBtn = document.getElementById('source-' + source + '-btn');
      activeBtn.classList.remove('bg-white/20', 'text-white', 'border-2', 'border-white/50');
      activeBtn.classList.add('bg-white', 'text-primary');
      highspeedButtons.classList.add('hidden');
      yukaidiButtons.classList.add('hidden');
      lanzouiButtons.classList.add('hidden');
      if (source === 'highspeed') {
        highspeedButtons.classList.remove('hidden');
      } else if (source === 'yukaidi') {
        yukaidiButtons.classList.remove('hidden');
      } else if (source === 'lanzoui') {
        lanzouiButtons.classList.remove('hidden');
      }
    }

    sourceHighspeedBtn.addEventListener('click', function() { switchSource('highspeed'); });
    sourceYukaidiBtn.addEventListener('click', function() { switchSource('yukaidi'); });
    sourceLanzouiBtn.addEventListener('click', function() { switchSource('lanzoui'); });

    function showModal(action = 'exe') {
      currentAction = action;
      passwordModal.classList.add('active');
      passwordInput.value = '';
      errorMessage.classList.remove('show');
      passwordInput.focus();
      document.body.style.overflow = 'hidden';
      setTimeout(renderTurnstile, 100);
    }

    function hideModal() {
      passwordModal.classList.remove('active');
      document.body.style.overflow = '';
      resetTurnstile();
    }

    function showOtherVersionsModal() {
      otherVersionsModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function hideOtherVersionsModal() {
      otherVersionsModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function showNoticeModal(msg) {
      noticeMessage.textContent = msg;
      noticeModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function hideNoticeModal() {
      noticeModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    document.getElementById('download-exe-btn').addEventListener('click', function() {
      showModal('exe');
    });

    document.getElementById('download-other-btn').addEventListener('click', function() {
      showModal('other');
    });

    document.getElementById('yukaidi-share-btn').addEventListener('click', function() {
      showModal('yukaidi');
    });

    document.getElementById('lanzoui-7z-btn').addEventListener('click', function() {
      showNoticeModal('请联系管理员获取单机包');
    });

    cancelBtn.addEventListener('click', hideModal);

    downloadMsiBtn.addEventListener('click', function() {
      hideOtherVersionsModal();
      window.location.href = base64Decode(msiUrl);
    });

    downloadZipBtn.addEventListener('click', function() {
      hideOtherVersionsModal();
      showNoticeModal('请联系管理员获取zip单机包');
    });

    closeOtherVersionsBtn.addEventListener('click', hideOtherVersionsModal);

    otherVersionsModal.addEventListener('click', function(e) {
      if (e.target === otherVersionsModal) {
        hideOtherVersionsModal();
      }
    });

    closeNoticeBtn.addEventListener('click', hideNoticeModal);

    noticeModal.addEventListener('click', function(e) {
      if (e.target === noticeModal) {
        hideNoticeModal();
      }
    });

    confirmBtn.addEventListener('click', verifyPassword);

    passwordInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        if (!document.getElementById('confirm-btn').disabled) {
          verifyPassword();
        }
      }
    });

    passwordModal.addEventListener('click', function(e) {
      if (e.target === passwordModal) {
        hideModal();
      }
    });

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex;
    }

    function base64Decode(str) {
      return decodeURIComponent(escape(atob(str)));
    }

    async function verifyPassword() {
      if (!turnstileToken && !window.__TURNHIDE__) {
        errorMessage.textContent = '请先完成人机验证';
        errorMessage.classList.add('show');
        return;
      }

      const inputPassword = passwordInput.value;
      const inputHash = await sha256(inputPassword);
      
      if (inputHash === passwordHash) {
        hideModal();
        
        if (currentAction === 'exe') {
          window.location.href = base64Decode(downloadUrl);
        } else if (currentAction === 'other') {
          showOtherVersionsModal();
        } else if (currentAction === 'yukaidi') {
          window.location.href = base64Decode(yukaidiShareUrl);
        }
      } else {
        errorMessage.textContent = '密码错误，请重试';
        errorMessage.classList.add('show');
        passwordInput.value = '';
        passwordInput.focus();
        
        const modal = passwordModal.querySelector('.modal');
        modal.style.animation = 'shake 0.5s ease';
        setTimeout(() => {
          modal.style.animation = '';
        }, 500);
      }
    }

    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(5px); }
      }
    `;
    document.head.appendChild(style);
  </script>
