  <script>
    const _T=[{n:'地理课件',c:[{n:'百年学典地理课件',k:'L01'},{n:'高分突破地理课件',k:'L02'},{n:'南方新课堂地理课件',k:'L03'}]},{n:'历史课件',c:[{n:'高分突破历史课件第一版',k:'L04'},{n:'高分突破历史课件第二版',k:'L05'},{n:'金牌学案历史课件',k:'L06'}]},{n:'生物课件',c:[{n:'金牌学案生物课件',k:'L07'},{n:'中考解读生物课件PPT',k:'L08'},{n:'中考解读生物课件希沃版',k:'L09'},{n:'中考解读生物真题36套',k:'L10'}]},{n:'数学课件',c:[{n:'金牌学案数学课件',k:'L11'}]},{n:'物理课件',c:[{n:'高分突破物理课件',k:'L12'},{n:'金牌学案物理课件',k:'L13'}]},{n:'英语课件',c:[{n:'高分突破WY版课件',k:'L14'},{n:'高分突破同步课件',k:'L15'},{n:'高分突破音频',k:'L16'},{n:'教材音频',k:'L17'},{n:'金牌学案英语课件',k:'L18'}]},{n:'语文课件',c:[{n:'高分突破语文课件',k:'L19'},{n:'金牌学案语文课件',k:'L20'},{n:'七彩课堂语文课件',k:'L21'}]},{n:'政治课件',k:'L22'}];

    async function sha256(m){const b=new TextEncoder().encode(m);const h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');}
    function b64d(s){try{return atob(s)}catch(e){return null}}


    const _SK='0x4AAAAAACnixqxBNO1F5Fc_';
    const _TS='bbeec1f60f0d531f75f31d01ca395aeb7fcb99d73be6d93134aed4e040a00bf8';
    let _tl=false,_cp=false,_ts=false;

    function loadTurnstile(){
      const s=document.createElement('script');
      s.src='https://challenges.cloudflare.com/turnstile/v0/api.js';
      s.async=true;
      s.onload=function(){_tl=true;triggerCaptcha();};
      s.onerror=function(){document.getElementById('login-status').textContent='人机验证组件加载失败，请检查网络';document.getElementById('login-status').style.color='#EF4444';};
      document.head.appendChild(s);
    }

    function triggerCaptcha(){
      if(!_tl){setTimeout(triggerCaptcha,500);return;}
      if(typeof turnstile==='undefined'){setTimeout(triggerCaptcha,500);return;}
      try{
        turnstile.render(document.getElementById('login-turnstile'),{
          sitekey:_SK,action:'login',theme:'light',
          callback:function(){
            _cp=true;
            document.getElementById('login-btn').disabled=false;
            document.getElementById('login-status').textContent='\u2713 人机验证通过，请登录';
            document.getElementById('login-status').style.color='#22C55E';
            setTimeout(()=>{document.getElementById('login-turnstile').style.display='none';},1500);
          },
          'error-callback':function(){document.getElementById('login-status').textContent='验证失败，请刷新重试';document.getElementById('login-status').style.color='#EF4444';},
          'expired-callback':function(){_cp=false;document.getElementById('login-btn').disabled=true;document.getElementById('login-status').textContent='验证已过期，请刷新重试';document.getElementById('login-status').style.color='#EF4444';}
        });
      }catch(e){document.getElementById('login-status').textContent='人机验证加载失败';document.getElementById('login-status').style.color='#EF4444';}
    }

    async function handleLogin(){
      const ph=document.getElementById('login-phone').value.trim();
      const pw=document.getElementById('login-password').value.trim();
      const st=document.getElementById('login-status');
      if(!_cp&&!_ts){st.textContent='请先完成人机验证';st.style.color='#EF4444';return;}
      if(!ph||!pw){st.textContent='请输入账号和密码';st.style.color='#EF4444';return;}
      if(!ph){st.textContent='请输入账号';st.style.color='#EF4444';return;}
      if(/^1\d{10}$/.test(ph)){}else if(ph.length<2){st.textContent='账号格式不正确';st.style.color='#EF4444';document.getElementById('login-phone').classList.add('error');setTimeout(()=>document.getElementById('login-phone').classList.remove('error'),500);return;}
      const phh=await sha256(ph);const ih=await sha256(pw);
      const ok=_X7K.find(a=>a.i===phh&&a.h===ih);
      if(ok){st.textContent='\u2713 登录成功！';st.style.color='#22C55E';sessionStorage.setItem('cowa_auth',await sha256(ph));setTimeout(showMainContent,800);}
      else{st.textContent='账号或密码错误';st.style.color='#EF4444';document.getElementById('login-phone').classList.add('error');document.getElementById('login-password').classList.add('error');setTimeout(()=>{document.getElementById('login-phone').classList.remove('error');document.getElementById('login-password').classList.remove('error');},500);}
    }

    function showMainContent(){
      document.getElementById('login-overlay').classList.add('hidden');
      document.getElementById('main-content').style.display='';
      buildFileTree();
    }

    function handleLogout(){

    }

    function buildFileTree(){
      const ct=document.getElementById('file-tree');
      ct.innerHTML='';
      _T.forEach(function(cat,idx){
        const hasSub=!!cat.c;
        if(hasSub){
          const uid='t'+Math.random().toString(36).slice(2,8);
          const item=document.createElement('div');
          item.className='tree-item folder';
          item.innerHTML='<span class="arrow" id="a-'+uid+'"><i class="fa-solid fa-chevron-right"></i></span><span class="icon" style="color:#F59E0B"><i class="fa-solid fa-folder"></i></span><span>'+cat.n+'</span>';
          item.onclick=function(){
            const ch=document.getElementById(uid);
            const ar=document.getElementById('a-'+uid);
            if(ch.classList.contains('open')){ch.classList.remove('open');ar.classList.remove('open');}
            else{ch.classList.add('open');ar.classList.add('open');}
          };
          ct.appendChild(item);
          const sub=document.createElement('div');
          sub.className='tree-children';
          sub.id=uid;
          if(idx===0){
            const ni=document.createElement('div');
            ni.className='notice-item';
            ni.innerHTML='<span class="icon" style="color:#D97706"><i class="fa-solid fa-bell"></i></span><span style="color:#D97706;font-weight:500">通知</span><span style="font-size:0.8rem;color:#9CA3AF;margin-left:0.3rem">点击查看</span>';
            ni.onclick=function(e){e.stopPropagation();document.getElementById('notice-modal').classList.add('visible');};
            sub.appendChild(ni);
          }
          cat.c.forEach(function(leaf){
            const li=document.createElement('div');
            li.className='tree-item leaf';
            li.style.paddingLeft='2.7rem';
            const lk=leaf.k;
            li.innerHTML='<span class="arrow"></span><span class="icon" style="color:#165DFF"><i class="fa-solid fa-folder-open"></i></span><span>'+leaf.n+'</span><span class="badge">蓝奏云</span>';
            li.onclick=function(e){e.stopPropagation();const u=b64d(_M3P[lk]);if(u)window.open(u,'_blank');};
            sub.appendChild(li);
          });
          ct.appendChild(sub);
        }else{
          const li=document.createElement('div');
          li.className='tree-item leaf';
          li.innerHTML='<span class="arrow"></span><span class="icon" style="color:#165DFF"><i class="fa-solid fa-folder-open"></i></span><span>'+cat.n+'</span><span class="badge">蓝奏云</span>';
          li.onclick=function(){const u=b64d(_M3P[cat.k]);if(u)window.open(u,'_blank');};
          ct.appendChild(li);
        }
      });
    }

    function handleYukaidiClick(){
      const u=b64d(_M3P['YK']);
      if(u)window.open(u,'_blank');
    }

    function closeNoticeModal(){
      document.getElementById('notice-modal').classList.remove('visible');
    }

    function openYukaidiFromModal(){
      closeNoticeModal();
      handleYukaidiClick();
    }


    document.getElementById('welcome-btn').addEventListener('click',function(){
      document.getElementById('welcome-overlay').classList.add('hidden');
      document.getElementById('login-overlay').classList.add('visible');
    });

    document.getElementById('login-btn').addEventListener('click',handleLogin);
    document.getElementById('login-password').addEventListener('keypress',function(e){if(e.key==='Enter')handleLogin();});
    document.getElementById('login-phone').addEventListener('keypress',function(e){if(e.key==='Enter')document.getElementById('login-password').focus();});
    document.getElementById('login-phone').addEventListener('input',function(){this.classList.remove('error');const s=document.getElementById('login-status');if(s.textContent.includes('账号'))s.textContent=''});
    document.getElementById('login-password').addEventListener('input',function(){this.classList.remove('error');const s=document.getElementById('login-status');if(s.textContent.includes('\u5bc6\u7801'))s.textContent='';});
    document.getElementById('logout-btn').addEventListener('click',handleLogout);

    (function(){
      const a=sessionStorage.getItem('cowa_auth');
      if(a){document.getElementById('welcome-overlay').classList.add('hidden');showMainContent();return;}
      const qp=new URLSearchParams(window.location.search);
      const tv=qp.get('turnsign');
      if(tv){
        sha256(tv).then(function(r){
          if(r===_TS){
            _ts=true;
            document.getElementById('login-btn').disabled=false;
            document.getElementById('login-turnstile').style.display='none';
          }else{loadTurnstile();}
        });
      }else{loadTurnstile();}
    })();
  </script>
